<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
   <link rel="icon" href="/image/logo1.png">
    <script src="/js/users.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Quicksand:wght@300..700&display=swap');

        *{
            font-family: "Quicksand", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }
        body{
            margin:0;
            background:#0b1120;
            color:white;
            font-family:Segoe UI;
            padding:30px;
        }

        h1{
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#1e293b;
        }

        th,td{
            padding:12px;
            border:1px solid #334155;
        }

        button{
            padding:8px 12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .hide{
            background:orange;
        }

        .show{
            background:green;
            color:white;
        }

        .delete{
            background:red;
            color:white;
        }

        .top-bar{
    position:fixed;
    top:20px;
    right:30px;
    z-index:999;
}

.back-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.back-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}
    </style>

</head>

<body>
<div class="top-bar">
    <button class="back-btn"
        onclick="location.href='dashboard.html'">
        ← Back
    </button>
</div>
    <h1>User Management</h1>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Level</th>
                <th>XP</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody id="userTable">

        </tbody>

    </table>

    <script src="../js/users.js"></script>

</body>

</html>
