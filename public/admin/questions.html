<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/image/logo1.png">
    <title>Question Bank</title>
    
    <script src="../js/questions.js"></script>
    


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Quicksand:wght@300..700&display=swap');

        * {
            font-family: "Quicksand", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        body {
            margin: 0;
            background: #0b1120;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            padding: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* CARD */
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 0, 0, .3);
        }

        /* ADD QUESTION */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-grid .full {
            grid-column: 1/-1;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .save-btn {
            margin-top: 20px;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: .2s;
        }

        .save-btn:hover {
            background: #1d4ed8;
        }

        /* TABLE */
        .question-section {
            margin-top: 25px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .search {
            max-width: 350px;
        }

        .table-wrapper {
            overflow: auto;
            border-radius: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #172554;
        }

        th {
            padding: 16px;
            text-align: left;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #1e293b;
        }

        tbody tr:hover {
            background: #172033;
        }

        /* Difficulty Badge */
        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .easy {
            background: #14532d;
            color: #86efac;
        }

        .medium {
            background: #78350f;
            color: #fcd34d;
        }

        .hard {
            background: #7f1d1d;
            color: #fca5a5;
        }

        /* Action */
        .delete-btn {
            background: #dc2626;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        @media(max-width:900px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search {
                max-width: none;
            }

        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .back-btn,
        .home-btn {
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: .2s;
        }

        .back-btn {
            background: #2563eb;

        }

        .home-btn {
            background: #3b82f6;

        }

        .back-btn:hover,
        .home-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header-bar">

            <div class="page-title">
                📚 Question Management
            </div>

            <div class="header-actions">
                <button class="back-btn" onclick="location.href='dashboard.html'">
                    ← Dashboard
                </button>
            </div>

        </div>

    </div>
    <div class="card">
        <h2>Add New Question</h2>
        <div class="form-grid">
            <input class="full" type="text" id="question" placeholder="Question">
            <input type="text" id="answer" placeholder="Correct Answer">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <input type="text" id="option1" placeholder="Option 1">
            <input type="text" id="option2" placeholder="Option 2">
            <input type="text" id="option3" placeholder="Option 3">
            <input type="text" id="option4" placeholder="Option 4">
        </div>
        <button class="save-btn" onclick="addQuestion()">
            Save Question
        </button>
    </div>

    <!-- QUESTION LIST -->
    <div class="card question-section">

        <div class="toolbar">
            <h2>Question Bank</h2>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Question</th>
                        <th>Answer</th>
                        <th>Difficulty</th>
                        <th>Option1</th>
                        <th>Option2</th>
                        <th>Option3</th>
                        <th>Option4</th>
                    </tr>
                </thead>
                <tbody id="questionTable"></tbody>
            </table>
        </div>
    </div>
    </div>
</body>

</html>
