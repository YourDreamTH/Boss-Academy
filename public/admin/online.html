<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Players</title>
    <link rel="icon" href="/image/logo1.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Quicksand:wght@300..700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Quicksand", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, #182033, #0b0f17);
            color: white;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #4da6ff;
        }

        .back-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #3b82f6;
        }

        .online-panel {
            max-width: 900px;
            margin: auto;
        }

        .online-panel h3 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        #onlineUsers {
            display: grid;
            grid-template-columns:
                repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 18px;
            padding: 20px;
            transition: .3s;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow:
                0 0 20px rgba(59, 130, 246, .2);
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2563eb;
            margin-bottom: 15px;
        }

        .username {
            font-size: 20px;
            font-weight: bold;
        }

        .level {
            color: #94a3b8;
            margin-top: 5px;
        }

        .status {
            margin-top: 10px;
            color: #00ff88;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
        }
    </style>
</head>

<body>

    <div class="header">

        <h1>🟢 Online Players</h1>

        <button class="back-btn" onclick="location.href='dashboard.html'">
            ← Dashboard
        </button>

    </div>

    <div class="online-panel">

        <div id="onlineUsers">
            <div class="empty">
                Loading...
            </div>
        </div>

    </div>

    <script>

        async function loadOnlineUsers() {

            const res = await fetch("/online-users");
            const users = await res.json();

            const box =
                document.getElementById("onlineUsers");

            if (users.length === 0) {

                box.innerHTML = `
            <div class="empty">
                No players online
            </div>
        `;

                return;
            }

            box.innerHTML = "";

            users.forEach(user => {

                box.innerHTML += `
        <div class="user-card">

            <img
                class="avatar"
                src="/upload/${user.avatar || 'default-avatar.png'}">

            <div class="username">
                ${user.username}
            </div>

            <div class="level">
                Level ${user.level}
            </div>

            <div class="status">
                🟢 Online
            </div>

        </div>
        `;
            });
        }

        loadOnlineUsers();

        setInterval(
            loadOnlineUsers,
            5000
        );

    </script>

</body>

</html>
