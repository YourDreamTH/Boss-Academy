<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Academy Admin</title>
    <link rel="shortcut icon" href="image/logo1.png" type="image/x-icon">
    <link rel="shortcut icon" href="/public/image/logo1.png" type="image/x-icon">
    

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Quicksand:wght@300..700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Quicksand", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, #182033, #0b0f17);
            color: white;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 42px;
            color: #4da6ff;
        }

        .header p {
            color: #94a3b8;
            margin-top: 10px;
        }

        .dashboard {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 24px;
            padding: 30px;
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(59, 130, 246, .2);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .card p {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #3b82f6;
        }

        .top-bar {
            padding: 20px;
        }

        .home-btn {
            width: auto;
            padding: 12px 20px;
            background: #334155;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .home-btn:hover {
            background: #475569;
        }

        .top-bar {
            position: fixed;
            top: 20px;
            right: 30px;

            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .top-bar h2 {
            color: white;
            margin: 0;
        }

        .logout-btn {
            border: none;
            background: #dc2626;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </div>
    <div class="header">
        <h1>👑 Boss Academy Admin</h1>
        <p>Manage questions and monitor players</p>
    </div>
    <div class="dashboard">

        <div class="grid">

            <div class="card">

                <div class="icon">📚</div>

                <h2>Question Manager</h2>

                <p>
                    Create, edit and delete questions
                    used in the game.
                </p>

                <button onclick="location.href='questions.html'">
                    Open Question Bank
                </button>

            </div>

            <div class="card">

                <div class="icon">🟢</div>

                <h2>Online Players</h2>

                <p>
                    View players currently active
                    on the website.
                </p>

                <button onclick="location.href='online.html'">
                    View Online Players
                </button>

            </div>
            <div class="card">

    <div class="icon">👥</div>

    <h2>User Manager</h2>

    <p>
        View, manage, and control all registered
        users in the system.
    </p>

    <button onclick="location.href='users.html'">
        Manage Users
    </button>

</div>

        </div>

    </div>

</body>
<script>
    function logout() {

        localStorage.removeItem("user");

        window.location.href = "/";
    }
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || user.role !== "admin") {
        window.location.href = "/";
    }
</script>

</html>
