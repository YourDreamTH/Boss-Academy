<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile | Boss Academy</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="shortcut icon" href="image/logo1.png" type="image/x-icon">

</head>

<body>

    <div class="profile-card">
        <h1> My Profile</h1>
        <div id="avatarSection" class="avatar-section">

            <img id="avatar" src="image/default-avatar.png" class="avatar" alt="avatar">

            <button class="profile_btn" onclick="document.getElementById('avatarInput').click()">

                Change Avatar

            </button>

            <input type="file" id="avatarInput" accept="image/*">

        </div>

        <h2 id="username"></h2>

        <div class="stats-box">
            <p id="level"></p>
            <p id="xp"></p>
            <div class="xp-bar">
                <div id="xpFill"></div>
            </div>
        </div>

        <button id="homeBtn">
            🏠 Back to Home
        </button>

    </div>

    <script src="js/profile.js"></script>

</body>

</html>
